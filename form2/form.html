<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Form</title>
</head>
<body>
<center>
<div class="container">
    <h1>Welcome to my first PHP form</h1>
    <p>Fill your details here</p>

    <form action="http://localhost/form2/form.php" method="post">
        <input type="text" name="name" placeholder="Enter your first name"><br><br>
        <input type="text" name="lname" placeholder="Enter your last name"><br><br>
        <input type="text" name="gender" placeholder="Enter your gender"><br><br>
        <input type="number" name="age" placeholder="Enter your age"><br><br>
        <input type="text" name="phone" placeholder="Enter your phone number"><br><br>

        <textarea name="address" placeholder="Enter your address"></textarea><br><br>

        <button type="submit" name="submit">Submit</button>
    </form>

</div>
</center>
</body>
</html>
